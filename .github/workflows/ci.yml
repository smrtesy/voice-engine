name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libsndfile1

      - name: Install Poetry
        run: pipx install poetry==1.7.0

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Lint
        run: poetry run ruff check src tests

      - name: Type check
        run: poetry run mypy src
        continue-on-error: true

      - name: Tests
        env:
          VOICE_ENGINE_API_KEY: test
          WEBHOOK_SIGNING_SECRET: test
          RESEMBLE_API_KEY: test
          ANTHROPIC_API_KEY: test
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test
          REDIS_URL: redis://localhost:6379
          SMRTESY_API_URL: http://localhost:3000
        run: poetry run pytest tests/unit -v
